services:
  test:
    image: golang:1.24
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command:
      - /usr/local/go/bin/go
      - test
      - -v
      - -mod=mod
      - ./...

volumes:
  go-mod-cache:
  go-build-cache:
